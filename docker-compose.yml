services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openchip-web
    working_dir: /app
    command: >
      sh -c "pnpm install --frozen-lockfile --force --config.confirmModulesPurge=false &&
      pnpm --filter @openchip/web dev --hostname 0.0.0.0 --port 3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - openchip_node_modules:/app/node_modules
      - openchip_web_node_modules:/app/apps/web/node_modules
      - openchip_db_node_modules:/app/packages/db/node_modules
      - openchip_integrations_node_modules:/app/packages/integrations/node_modules
      - openchip_shared_node_modules:/app/packages/shared/node_modules
      - openchip_workflow_node_modules:/app/packages/workflow/node_modules
      - openchip_next_cache:/app/apps/web/.next
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://postgres:openchip@supabase-db:5432/postgres
      SUPABASE_STORAGE_URL: http://supabase-storage:5000
      SUPABASE_STORAGE_BUCKET: openchip-documents
      SUPABASE_STORAGE_SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJvcGVuY2hpcC1sb2NhbCIsImlhdCI6MTc3MzAxNTczNSwiZXhwIjoyMDg4Mzc1NzM1LCJyb2xlIjoic2VydmljZV9yb2xlIn0.G7jwkuCsbetB2Toz7QdDmkpt5mtbQJa_GWkcG4Xo-hQ
      APP_BASE_URL: http://localhost:3000
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: onboarding@openchip.local
      MAILPIT_API_BASE_URL: http://mailpit:8025
      SAP_INTEGRATION_API_KEY: local-sap-integration-key
      CI: "true"
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-storage:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      mailpit:
        condition: service_started

  supabase-db:
    image: postgres:16-alpine
    container_name: openchip-supabase-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: openchip
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - openchip_supabase_db_data:/var/lib/postgresql/data
      - ./infra/supabase/init/01-openchip-roles.sql:/docker-entrypoint-initdb.d/01-openchip-roles.sql:ro

  supabase-rest:
    image: postgrest/postgrest:v14.5
    container_name: openchip-supabase-rest
    depends_on:
      supabase-db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:openchip@supabase-db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      PGRST_DB_USE_LEGACY_GUCS: "false"

  supabase-imgproxy:
    image: darthsim/imgproxy:v3.30.1
    container_name: openchip-supabase-imgproxy
    environment:
      IMGPROXY_BIND: ":5001"
      IMGPROXY_LOCAL_FILESYSTEM_ROOT: /
      IMGPROXY_USE_ETAG: "true"
      IMGPROXY_ENABLE_WEBP_DETECTION: "true"
      IMGPROXY_MAX_SRC_RESOLUTION: 16.8

  minio:
    image: minio/minio:latest
    container_name: openchip-supabase-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "5600:9000"
      - "5601:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - openchip_minio_data:/data

  minio-init:
    image: minio/mc:latest
    container_name: openchip-supabase-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio minio123 &&
      mc mb -p local/openchip-documents || true
      "

  supabase-storage:
    image: supabase/storage-api:v1.37.8
    container_name: openchip-supabase-storage
    depends_on:
      supabase-db:
        condition: service_healthy
      supabase-rest:
        condition: service_started
      supabase-imgproxy:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJvcGVuY2hpcC1sb2NhbCIsImlhdCI6MTc3MzAxNTczNSwiZXhwIjoyMDg4Mzc1NzM1LCJyb2xlIjoiYW5vbiJ9.YQyaNt80rkziBIYwa98cFC3PH4Wj0hRbmK5MrpQqILQ
      SERVICE_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJvcGVuY2hpcC1sb2NhbCIsImlhdCI6MTc3MzAxNTczNSwiZXhwIjoyMDg4Mzc1NzM1LCJyb2xlIjoic2VydmljZV9yb2xlIn0.G7jwkuCsbetB2Toz7QdDmkpt5mtbQJa_GWkcG4Xo-hQ
      POSTGREST_URL: http://supabase-rest:3000
      PGRST_JWT_SECRET: super-secret-jwt-token-with-at-least-32-characters-long
      DATABASE_URL: postgres://postgres:openchip@supabase-db:5432/postgres
      DATABASE_SEARCH_PATH: storage,public
      DB_INSTALL_ROLES: "true"
      REQUEST_ALLOW_X_FORWARDED_PATH: "true"
      FILE_SIZE_LIMIT: 52428800
      STORAGE_BACKEND: s3
      GLOBAL_S3_BUCKET: openchip-documents
      GLOBAL_S3_ENDPOINT: http://minio:9000
      GLOBAL_S3_PROTOCOL: http
      GLOBAL_S3_FORCE_PATH_STYLE: "true"
      AWS_ACCESS_KEY_ID: minio
      AWS_SECRET_ACCESS_KEY: minio123
      TENANT_ID: stub
      REGION: stub
      ENABLE_IMAGE_TRANSFORMATION: "true"
      IMGPROXY_URL: http://supabase-imgproxy:5001
      S3_PROTOCOL_ACCESS_KEY_ID: local-s3-access-key
      S3_PROTOCOL_ACCESS_KEY_SECRET: local-s3-secret-key
    ports:
      - "5500:5000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      timeout: 5s
      interval: 5s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: openchip-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  openchip_supabase_db_data:
  openchip_minio_data:
  openchip_node_modules:
  openchip_web_node_modules:
  openchip_db_node_modules:
  openchip_integrations_node_modules:
  openchip_shared_node_modules:
  openchip_workflow_node_modules:
  openchip_next_cache:
